<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Chat — BTech Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8f9fa; color:#111; height:100vh; display:flex; flex-direction:column; }

    nav { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 1.5rem; height:56px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .logo { font-size:1.1rem; font-weight:700; text-decoration:none; color:#111; }
    .logo span { color:#4f46e5; }
    .nav-right { display:flex; align-items:center; gap:0.75rem; }
    .btn { padding:0.4rem 0.85rem; border-radius:6px; font-size:0.8rem; font-weight:500; cursor:pointer; border:none; font-family:'Inter',sans-serif; text-decoration:none; display:inline-flex; align-items:center; gap:0.3rem; }
    .btn-outline { background:#fff; border:1px solid #d1d5db; color:#374151; }
    .btn-primary { background:#4f46e5; color:#fff; }

    .chat-header { background:#fff; border-bottom:1px solid #e5e7eb; padding:0.75rem 1.5rem; display:flex; align-items:center; gap:0.75rem; flex-shrink:0; }
    .chat-header-icon { font-size:1.5rem; }
    .chat-header-title { font-size:1rem; font-weight:700; }
    .chat-header-sub { font-size:0.78rem; color:#6b7280; }
    .online-dot { width:8px; height:8px; background:#22c55e; border-radius:50%; display:inline-block; margin-right:4px; }

    .messages-area { flex:1; overflow-y:auto; padding:1rem 1.5rem; display:flex; flex-direction:column; gap:0.75rem; }

    .msg-wrap { display:flex; gap:0.6rem; align-items:flex-end; }
    .msg-wrap.mine { flex-direction:row-reverse; }
    .avatar { width:32px; height:32px; border-radius:50%; background:#4f46e5; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; color:#fff; flex-shrink:0; }
    .msg-content { max-width:70%; }
    .msg-name { font-size:0.7rem; color:#9ca3af; margin-bottom:0.2rem; }
    .mine .msg-name { text-align:right; }
    .msg-bubble { padding:0.6rem 0.9rem; border-radius:16px; font-size:0.875rem; line-height:1.5; word-break:break-word; }
    .msg-bubble.other { background:#fff; border:1px solid #e5e7eb; border-bottom-left-radius:4px; }
    .msg-bubble.mine { background:#4f46e5; color:#fff; border-bottom-right-radius:4px; }
    .msg-time { font-size:0.65rem; color:#9ca3af; margin-top:0.2rem; }
    .mine .msg-time { text-align:right; }

    .date-divider { text-align:center; font-size:0.72rem; color:#9ca3af; margin:0.5rem 0; }
    .date-divider span { background:#f8f9fa; padding:0 0.75rem; }

    .input-area { background:#fff; border-top:1px solid #e5e7eb; padding:0.75rem 1.5rem; display:flex; gap:0.75rem; align-items:center; flex-shrink:0; }
    .chat-input { flex:1; border:1px solid #d1d5db; border-radius:24px; padding:0.6rem 1rem; font-size:0.875rem; font-family:'Inter',sans-serif; outline:none; background:#f9fafb; }
    .chat-input:focus { border-color:#4f46e5; background:#fff; }
    .send-btn { background:#4f46e5; color:#fff; border:none; border-radius:50%; width:40px; height:40px; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
    .send-btn:hover { background:#4338ca; }
    .send-btn:disabled { background:#9ca3af; cursor:not-allowed; }

    .login-prompt { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; color:#6b7280; }
    .login-prompt h2 { font-size:1rem; font-weight:600; color:#111; }

    .spinner { width:20px; height:20px; border:2px solid #e5e7eb; border-top-color:#4f46e5; border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .empty-chat { text-align:center; color:#9ca3af; padding:2rem; font-size:0.875rem; }
    .empty-chat .e-icon { font-size:2rem; margin-bottom:0.5rem; }

    @media(max-width:640px) {
      .messages-area { padding:0.75rem; }
      .input-area { padding:0.75rem; }
      .msg-content { max-width:85%; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">BTech<span>Vault</span></a>
  <div class="nav-right">
    <a href="index.html" class="btn btn-outline">← Back</a>
    <div id="navUser"></div>
  </div>
</nav>

<div class="chat-header">
  <div class="chat-header-icon">💬</div>
  <div>
    <div class="chat-header-title">Student Chat Room</div>
    <div class="chat-header-sub"><span class="online-dot"></span>Public • All BTech students</div>
  </div>
</div>

<div class="messages-area" id="messagesArea">
  <div style="display:flex;justify-content:center;padding:2rem;">
    <div class="spinner"></div>
  </div>
</div>

<div class="input-area" id="inputArea" style="display:none;">
  <img id="userAvatar" src="" style="width:32px;height:32px;border-radius:50%;display:none;" referrerpolicy="no-referrer"/>
  <input class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"/>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<div id="loginPrompt" style="display:none;" class="login-prompt">
  <div style="font-size:2rem;">🔐</div>
  <h2>Login to Chat</h2>
  <p style="font-size:0.85rem;">Join the student community!</p>
  <a href="login.html" class="btn btn-primary" style="padding:0.6rem 1.5rem;">Login / Sign Up</a>
</div>

<script>
let currentUser = null;
let unsubscribe = null;

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('loginPrompt').style.display = 'none';
    const avatar = document.getElementById('userAvatar');
    if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
    document.getElementById('navUser').innerHTML = `<span style="font-size:0.82rem;color:#6b7280;">${user.displayName?.split(' ')[0]||''}</span>`;
  } else {
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('loginPrompt').style.display = 'flex';
    document.getElementById('navUser').innerHTML = `<a href="login.html" class="btn btn-primary">Login</a>`;
  }
  loadMessages();
});

function loadMessages() {
  if (unsubscribe) unsubscribe();
  const area = document.getElementById('messagesArea');

  unsubscribe = db.collection('globalChat')
    .orderBy('createdAt', 'asc')
    .limitToLast(100)
    .onSnapshot(snap => {
      if (snap.empty) {
        area.innerHTML = `<div class="empty-chat"><div class="e-icon">💬</div><p>No messages yet.<br>Start the conversation!</p></div>`;
        return;
      }

      let html = '';
      let lastDate = '';

      snap.docs.forEach(doc => {
        const m = doc.data();
        const isMe = currentUser && m.userId === currentUser.uid;
        const date = m.createdAt ? new Date(m.createdAt.seconds * 1000) : new Date();
        const dateStr = date.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
        const timeStr = date.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
        const initials = (m.userName||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

        if (dateStr !== lastDate) {
          html += `<div class="date-divider"><span>${dateStr}</span></div>`;
          lastDate = dateStr;
        }

        html += `<div class="msg-wrap ${isMe ? 'mine' : ''}">
          ${!isMe ? `<div class="avatar" style="background:${stringToColor(m.userId||'x')}">${initials}</div>` : ''}
          <div class="msg-content">
            ${!isMe ? `<div class="msg-name">${esc(m.userName||'Anonymous')}</div>` : ''}
            <div class="msg-bubble ${isMe ? 'mine' : 'other'}">${esc(m.text)}</div>
            <div class="msg-time">${timeStr}</div>
          </div>
          ${isMe ? `<div class="avatar" style="background:#4f46e5">${initials}</div>` : ''}
        </div>`;
      });

      area.innerHTML = html;
      area.scrollTop = area.scrollHeight;
    }, err => {
      area.innerHTML = `<div class="empty-chat"><p>Error loading messages.<br>${err.message}</p></div>`;
    });
}

async function sendMessage() {
  if (!currentUser) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  try {
    await db.collection('globalChat').add({
      text,
      userId: currentUser.uid,
      userName: currentUser.displayName || 'Anonymous',
      userPhoto: currentUser.photoURL || null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    input.value = text;
  }
  btn.disabled = false;
  input.focus();
}

function stringToColor(str) {
  const colors = ['#7c3aed','#db2777','#ea580c','#16a34a','#0284c7','#9333ea','#dc2626','#0891b2'];
  let hash = 0;
  for (let c of str) hash = c.charCodeAt(0) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
