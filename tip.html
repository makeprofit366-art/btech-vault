<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support Peritto ☕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0d12;--s1:#13161f;--s2:#1a1d28;--border:#252836;
      --amber:#f59e0b;--text:#f0f2f8;--muted:#7a8099;--success:#22c55e;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 45% at 15% 5%,rgba(245,158,11,.07) 0%,transparent 65%),
                 radial-gradient(ellipse 55% 40% at 85% 90%,rgba(99,102,241,.07) 0%,transparent 60%);}

    nav{position:sticky;top:0;z-index:100;background:rgba(11,13,18,.9);backdrop-filter:blur(14px);
        border-bottom:1px solid var(--border);height:56px;padding:0 1.5rem;
        display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none;}
    .logo em{color:var(--amber);font-style:normal;}
    .back{display:flex;align-items:center;gap:.35rem;font-size:.8rem;color:var(--muted);
          text-decoration:none;padding:.38rem .8rem;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
    .back:hover{color:var(--text);border-color:var(--amber);}

    /* HERO */
    .hero{position:relative;z-index:1;text-align:center;padding:2.8rem 1.5rem 1.5rem;}
    .orb-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
    .orb-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;
      border:2px solid rgba(245,158,11,.2);animation:pulse 2.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.4;}50%{transform:scale(1.12);opacity:1;}}
    .orb{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);
         display:flex;align-items:center;justify-content:center;font-size:2rem;
         box-shadow:0 0 36px rgba(245,158,11,.3);}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,5vw,2.5rem);font-weight:800;
             line-height:1.15;margin-bottom:.6rem;
             background:linear-gradient(135deg,#fff 0%,#f59e0b 100%);
             -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero p{font-size:.9rem;color:var(--muted);max-width:370px;margin:0 auto;line-height:1.65;}
    .badges{display:flex;justify-content:center;gap:.45rem;flex-wrap:wrap;margin-top:1rem;}
    .badge{font-size:.7rem;color:var(--muted);padding:.28rem .7rem;border-radius:20px;
           background:var(--s1);border:1px solid var(--border);}

    /* WRAP */
    .wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}

    /* CARD */
    .card{background:var(--s1);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:.85rem;}

    /* AMOUNT */
    .amt-sec{padding:1.35rem 1.5rem .9rem;border-bottom:1px solid var(--border);}
    .sec-lbl{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:.75rem;}
    .amt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.45rem;margin-bottom:.75rem;}
    .ab{background:var(--s2);border:1.5px solid var(--border);border-radius:10px;
        padding:.6rem .3rem;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;
        color:var(--muted);cursor:pointer;transition:all .18s;text-align:center;}
    .ab:hover{border-color:var(--amber);color:var(--amber);}
    .ab.on{background:rgba(245,158,11,.1);border-color:var(--amber);color:var(--amber);}
    .cust{position:relative;}
    .cust .pre{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
               font-size:.95rem;color:var(--muted);font-weight:600;pointer-events:none;}
    .cust input{width:100%;padding:.62rem 1rem .62rem 1.9rem;background:var(--s2);
                border:1.5px solid var(--border);border-radius:10px;
                font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);
                outline:none;transition:all .18s;}
    .cust input:focus{border-color:var(--amber);background:rgba(245,158,11,.04);}
    .cust input::placeholder{color:var(--muted);}

    /* APPS */
    .apps-sec{padding:1.25rem 1.5rem;}
    .apps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;}
    .app{display:flex;flex-direction:column;align-items:center;gap:.55rem;
         padding:1.1rem .5rem .85rem;border-radius:16px;border:1.5px solid var(--border);
         background:var(--s2);cursor:pointer;text-decoration:none;transition:all .22s;}
    .app:hover{transform:translateY(-4px);}
    .app:active{transform:scale(.97);}
    .app.gpay:hover{border-color:#4285f4;box-shadow:0 8px 28px rgba(66,133,244,.2);}
    .app.phonepe:hover{border-color:#6500a3;box-shadow:0 8px 28px rgba(101,0,163,.25);}
    .app.paytm:hover{border-color:#00bae8;box-shadow:0 8px 28px rgba(0,186,232,.2);}
    .app-ico{width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;}
    .app-lbl{font-size:.75rem;font-weight:600;}
    .app.gpay .app-lbl{color:#4285f4;}
    .app.phonepe .app-lbl{color:#a855f7;}
    .app.paytm .app-lbl{color:#00bae8;}



    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);
           padding:.6rem 1.3rem;border-radius:50px;font-size:.83rem;font-weight:600;
           z-index:999;opacity:0;transition:all .3s;white-space:nowrap;color:#fff;}
    .toast.info{background:#3b82f6;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    @media(max-width:380px){.amt-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Peritto<em>.</em></a>
  <a href="index.html" class="back">← Back</a>
</nav>

<div class="hero">
  <div class="orb-wrap"><div class="orb">☕</div></div>
  <h1>Support Peritto</h1>
  <p>We keep all study materials 100% free. Your support helps us stay online &amp; grow!</p>
  <div class="badges">
    <span class="badge">🔒 100% Secure</span>
    <span class="badge">⚡ Instant Payment</span>
    <span class="badge">❤️ Free Forever</span>
  </div>
</div>

<div class="wrap">
  <div class="card">

    <!-- Amount -->
    <div class="amt-sec">
      <div class="sec-lbl">☕ Choose Amount</div>
      <div class="amt-grid">
        <button class="ab" onclick="pick(10,this)">₹10</button>
        <button class="ab on" onclick="pick(20,this)">₹20</button>
        <button class="ab" onclick="pick(50,this)">₹50</button>
        <button class="ab" onclick="pick(100,this)">₹100</button>
      </div>
      <div class="cust">
        <span class="pre">₹</span>
        <input type="number" id="cin" placeholder="Custom amount" min="1" value="20" oninput="customPick()"/>
      </div>
    </div>

    <!-- Apps -->
    <div class="apps-sec">
      <div class="sec-lbl" style="margin-bottom:.85rem">Pay with</div>
      <div class="apps-grid">

        <!-- GPay -->
        <a class="app gpay" href="#" onclick="pay('gpay');return false;">
          <div class="app-ico">
            <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
              <rect width="52" height="52" rx="14" fill="#fff"/>
              <path d="M26 22c1.8 0 3.1.7 3.8 1.4l2.8-2.8C30.7 18.8 28.6 18 26 18c-3.8 0-7 2.2-8.6 5.4l3.3 2.5C21.5 23.6 23.6 22 26 22z" fill="#EA4335"/>
              <path d="M17 26c0-.7.1-1.4.3-2l-3.3-2.5C13.4 22.8 13 24.3 13 26s.4 3.2 1 4.5L17.4 28C17.1 27.4 17 26.7 17 26z" fill="#FBBC05"/>
              <path d="M26 34c-2.4 0-4.5-1.6-5.3-3.9L17.4 32c1.6 3.2 4.9 5.4 8.6 5.4 2.5 0 4.5-.8 6-2.3l-3-2.3C28.2 33.5 27.2 34 26 34z" fill="#34A853"/>
              <path d="M38 26c0-.7-.1-1.4-.2-2H26v4.2h6.8c-.3 1.5-1.1 2.7-2.3 3.5l3 2.3C35.8 32 38 29.3 38 26z" fill="#4285F4"/>
            </svg>
          </div>
          <span class="app-lbl">GPay</span>
        </a>

        <!-- PhonePe -->
        <a class="app phonepe" href="#" onclick="pay('phonepe');return false;">
          <div class="app-ico">
            <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
              <rect width="52" height="52" rx="14" fill="#5f259f"/>
              <!-- P shape -->
              <path d="M14 12h12c5.5 0 9.5 3.8 9.5 9.5S31.5 31 26 31h-7v9h-5V12z" fill="#fff"/>
              <ellipse cx="25" cy="21.5" rx="4" ry="5" fill="#5f259f"/>
              <!-- Pe circle -->
              <circle cx="37" cy="37" r="7.5" fill="#fff"/>
              <text x="37" y="41" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="900" fill="#5f259f">Pe</text>
            </svg>
          </div>
          <span class="app-lbl">PhonePe</span>
        </a>

        <!-- Paytm -->
        <a class="app paytm" href="#" onclick="pay('paytm');return false;">
          <div class="app-ico">
            <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
              <rect width="52" height="52" rx="14" fill="#00bae8"/>
              <rect x="6" y="17" width="40" height="18" rx="5" fill="#fff"/>
              <text x="26" y="30" text-anchor="middle" font-family="Arial Black,Arial" font-size="10.5" font-weight="900" fill="#00bae8">Paytm</text>
            </svg>
          </div>
          <span class="app-lbl">Paytm</span>
        </a>

      </div>
    </div>
  </div>


</div>

<div class="toast info" id="toast"></div>

<script>
  const UPI = 'kirankumarr929@okaxis';
  const NAME = encodeURIComponent('Peritto');
  const NOTE = encodeURIComponent('Supporting Peritto');
  let amt = 20;

  function pick(v, el) {
    amt = v;
    document.querySelectorAll('.ab').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('cin').value = v;
  }

  function customPick() {
    amt = parseInt(document.getElementById('cin').value) || 0;
    document.querySelectorAll('.ab').forEach(b => b.classList.remove('on'));
  }

  function pay(app) {
    const a = amt || 20;
    const pa = encodeURIComponent(UPI);
    let url;
    if (app === 'gpay')    url = `gpay://upi/pay?pa=${pa}&pn=${NAME}&am=${a}&cu=INR&tn=${NOTE}`;
    else if (app === 'phonepe') url = `phonepe://pay?pa=${pa}&pn=${NAME}&am=${a}&cu=INR&tn=${NOTE}`;
    else if (app === 'paytm')   url = `paytmmp://pay?pa=${pa}&pn=${NAME}&am=${a}&cu=INR&tn=${NOTE}`;

    window.location.href = url;

    // Fallback: if app not installed, open generic UPI link
    setTimeout(() => {
      if (document.hasFocus()) {
        window.location.href = `upi://pay?pa=${pa}&pn=${NAME}&am=${a}&cu=INR&tn=${NOTE}`;
        showToast('📱 Opening payment app...');
      }
    }, 1500);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
